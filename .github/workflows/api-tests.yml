name: Restful-Booker API Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1-5'

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  api-tests:
    name: Run API Tests
    runs-on: ubuntu-latest
    outputs:
      publish_pages: ${{ steps.pages-prep.outputs.publish }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Ensure reports directory exists
        run: mkdir -p reports

      - name: Run API tests
        run: python -m pytest
        env:
          BASE_URL: https://restful-booker.herokuapp.com
          BOOKER_USERNAME: admin
          BOOKER_PASSWORD: password123

      - name: Prepare GitHub Pages (index.html)
        id: pages-prep
        if: always()
        run: |
          PUBLISH=false
          if [ "${{ github.ref }}" = "refs/heads/main" ] \
            && [ "${{ github.event_name }}" != "pull_request" ] \
            && [ -f reports/report.html ]; then
            cp reports/report.html reports/index.html
            PUBLISH=true
          fi
          echo "publish=${PUBLISH}" >> "$GITHUB_OUTPUT"

      - name: Upload HTML report (downloadable zip)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-report-${{ github.run_number }}
          path: reports/report.html
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Pages artifact
        if: steps.pages-prep.outputs.publish == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports

  deploy-pages:
    name: Publish report to GitHub Pages
    runs-on: ubuntu-latest
    needs: api-tests
    if: needs.api-tests.outputs.publish_pages == 'true'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
